name: PulseMeter
options:
  bundleIdPrefix: com.javiergil
  deploymentTarget:
    watchOS: "11.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  PulseMeter Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: "PulseMeter Watch App"
        excludes:
          - "Info.plist"
          - "PulseMeter.entitlements"
    info:
      path: "PulseMeter Watch App/Info.plist"
      properties:
        CFBundleDisplayName: PulseMeter
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKWatchOnly: true
        NSHealthShareUsageDescription: "PulseMeter necesita acceso a tu ritmo cardiaco para avisarte cuando salgas de tu rango objetivo."
        NSHealthUpdateUsageDescription: "PulseMeter guarda una sesión de entrenamiento mientras monitoriza tu ritmo cardiaco."
        WKBackgroundModes:
          - workout-processing
        UIRequiredDeviceCapabilities:
          - watch-companion
    entitlements:
      path: "PulseMeter Watch App/PulseMeter.entitlements"
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.javiergil.PulseMeter
        TARGETED_DEVICE_FAMILY: "4"
        DEVELOPMENT_ASSET_PATHS: "\"PulseMeter Watch App/Preview Content\""
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: "NO"
        SUPPORTS_MACCATALYST: "NO"
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        SDKROOT: watchos
